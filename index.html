<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>GPS + Nominatim</title>
</head>
<body>

<h2>Localização Automática + Endereço</h2>

<button onclick="pegarLocalizacao()">Pegar Localização</button>

<p><strong>Latitude:</strong> <span id="lat"></span></p>
<p><strong>Longitude:</strong> <span id="lon"></span></p>

<p><strong>Endereço:</strong></p>
<pre id="endereco"></pre>

<script>
function pegarLocalizacao() {
    if (!navigator.geolocation) {
        alert("Geolocalização não suportada no seu navegador.");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        function(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            document.getElementById("lat").textContent = lat;
            document.getElementById("lon").textContent = lon;

            buscarEndereco(lat, lon);
        },
        function(err) {
            alert("Erro ao obter localização: " + err.message);
        }
    );
}

function buscarEndereco(lat, lon) {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`;

    fetch(url, {
        headers: {
            "User-Agent": "PMRV-Automation-Demo"
        }
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("endereco").textContent =
            JSON.stringify(data, null, 2);
    })
    .catch(error => {
        document.getElementById("endereco").textContent = "Erro: " + error;
    });
}
</script>

</body>
</html>
